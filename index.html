<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>두근두근 엄마연구 시뮬레이터</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: -apple-system, 'Noto Sans KR', sans-serif;
      overflow: hidden;
      background: #FF6EB4;
    }

    /* ── 배경 그라디언트 ── */
    #bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, #FF9ECD 0%, #FF6EB4 45%, #E0448A 100%);
    }

    /* ── 반짝이 캔버스 ── */
    #sparkle-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    /* ── 콘텐츠 래퍼 ── */
    #content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    /* ── 로고 ── */
    #logo {
      width: min(680px, 88vw);
      transform: translateY(-120vh);
      animation: logo-drop 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
      filter: drop-shadow(0 8px 24px rgba(160, 0, 80, 0.45));
    }

    @keyframes logo-drop {
      to { transform: translateY(0); }
    }

    /* 착지 후 바운스 */
    #logo.landed {
      animation: logo-bounce 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }
    @keyframes logo-bounce {
      0%   { transform: scaleY(1); }
      35%  { transform: scaleY(0.88) scaleX(1.05); }
      65%  { transform: scaleY(1.04) scaleX(0.98); }
      100% { transform: scaleY(1); }
    }

    /* ── 시작 버튼 ── */
    #start-btn {
      opacity: 0;
      transform: translateY(20px);
      animation: btn-appear 0.5s ease-out 1.15s forwards;

      padding: 18px 64px;
      border-radius: 999px;
      border: 5px solid #7A5C3A;
      background: #FFD700;
      color: #7A5C3A;
      font-size: 26px;
      font-weight: 800;
      font-family: inherit;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow:
        0 6px 0 #B8960A,
        0 10px 28px rgba(0,0,0,0.18);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    @keyframes btn-appear {
      to { opacity: 1; transform: translateY(0); }
    }

    #start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #B8960A, 0 14px 32px rgba(0,0,0,0.2);
    }
    #start-btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #B8960A, 0 6px 16px rgba(0,0,0,0.18);
    }

    /* 버튼 펄스 애니메이션 */
    #start-btn.ready {
      animation: btn-pulse 2s ease-in-out infinite;
    }
    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 6px 0 #B8960A, 0 10px 28px rgba(0,0,0,0.18), 0 0 0 0 rgba(255,215,0,0); }
      50%       { box-shadow: 0 6px 0 #B8960A, 0 10px 28px rgba(0,0,0,0.18), 0 0 0 12px rgba(255,215,0,0); }
    }
  </style>
</head>
<body>

<div id="bg"></div>
<canvas id="sparkle-canvas"></canvas>

<div id="content">
  <img id="logo" src="assets/title-logo.png" alt="두근두근 엄마연구 시뮬레이터">
  <button id="start-btn">게임 시작!</button>
</div>

<script>
/* ── 반짝이 파티클 ── */
const sc = document.getElementById('sparkle-canvas');
const ctx = sc.getContext('2d');
let W, H;

function resize() {
  W = sc.width  = window.innerWidth;
  H = sc.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const SPARKLES = Array.from({ length: 55 }, () => makeSparkle());

function makeSparkle(fromScratch = true) {
  return {
    x: Math.random() * (typeof W !== 'undefined' ? W : window.innerWidth),
    y: fromScratch ? Math.random() * (typeof H !== 'undefined' ? H : window.innerHeight) : H + 10,
   size: 3 + Math.random() * 9,
    speed: 0.4 + Math.random() * 1.0,
    opacity: Math.random(),
    opacityDir: Math.random() > 0.5 ? 1 : -1,
    opacitySpeed: 0.01 + Math.random() * 0.025,
    type: Math.floor(Math.random() * 3), // 0=star, 1=circle, 2=diamond
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.06,
    drift: (Math.random() - 0.5) * 0.4,
  };
}

function drawStar(ctx, x, y, r, opacity) {
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = opacity;
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 8;
  // 4-pointed star
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const angle = (i * Math.PI) / 4;
    const rad   = i % 2 === 0 ? r : r * 0.42;
    ctx.lineTo(Math.cos(angle) * rad, Math.sin(angle) * rad);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawDiamond(ctx, x, y, r, opacity) {
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = opacity;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(0, -r); ctx.lineTo(r*0.6, 0);
  ctx.lineTo(0, r);  ctx.lineTo(-r*0.6, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawCircle(ctx, x, y, r, opacity) {
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(x, y, r * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function tick() {
  ctx.clearRect(0, 0, W, H);

  for (const s of SPARKLES) {
    // 그리기
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rotation);
    ctx.translate(-s.x, -s.y);

    if      (s.type === 0) drawStar(ctx, s.x, s.y, s.size, s.opacity);
    else if (s.type === 1) drawCircle(ctx, s.x, s.y, s.size, s.opacity);
    else                   drawDiamond(ctx, s.x, s.y, s.size, s.opacity);

    ctx.restore();

    // 업데이트
    s.y -= s.speed;
    s.x += s.drift;
    s.rotation += s.rotSpeed;
    s.opacity += s.opacityDir * s.opacitySpeed;

    if (s.opacity >= 1) { s.opacity = 1; s.opacityDir = -1; }
    if (s.opacity <= 0) { s.opacity = 0; s.opacityDir = 1; }

	if (s.y < -20) {
	  Object.assign(s, makeSparkle(false));
	}
  }

  requestAnimationFrame(tick);
}
tick();

/* ── 로고 착지 & 버튼 펄스 ── */
const logo    = document.getElementById('logo');
const startBtn = document.getElementById('start-btn');

logo.addEventListener('animationend', () => {
  // drop 애니메이션 고정 후 바운스로 교체
  logo.style.transform = 'translateY(0)';
  logo.style.animation = 'logo-bounce 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97)';
});

// 버튼 나타난 후 펄스 시작
setTimeout(() => startBtn.classList.add('ready'), 1700);

/* ── 시작 버튼 ── */
startBtn.addEventListener('click', () => {
  window.location.href = 'customize.html';
});
</script>
</body>
</html>
