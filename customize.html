<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캐릭터 만들기</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 인트로/아웃트로 오버레이 -->
<div id="intro-screen">
  <div id="intro-bg"></div>
  <img id="doctor-npc" src="assets/npc/doctor.png" alt="박사">
  <div id="intro-dialog-box">
	<div id="intro-speaker">엄박사</div>
    <div id="intro-dialog-text"></div>
    <div id="intro-dialog-arrow">▼</div>
  </div>
</div>

<div id="app">

  <div id="customize-screen" class="screen">
    <div class="customize-header">
      <span class="game-title">✦ 캐릭터 만들기</span>
    </div>

    <div class="customize-layout">

      <!-- 왼쪽: 미리보기 (40%) -->
      <div class="preview-panel">
        <div class="preview-aspect">
          <canvas id="preview-canvas" width="360" height="500"></canvas>
        </div>
      </div>

      <!-- 오른쪽: 옵션 (60%) -->
      <div class="options-panel">
        <div class="category-tabs">
          <button class="cat-tab active" data-cat="face">얼굴</button>
          <button class="cat-tab" data-cat="hair">머리스타일</button>
          <button class="cat-tab" data-cat="clothing">의상</button>
          <button class="cat-tab" data-cat="accessory">액세서리</button>
          <button class="cat-tab" data-cat="personality">성격</button>
        </div>

        <!-- 얼굴 탭 -->
        <div id="panel-face" class="category-panel">
          <div class="sub-tabs">
            <button class="sub-tab active" data-sub="face-shape">얼굴형</button>
            <button class="sub-tab" data-sub="eyes">눈/눈썹</button>
            <button class="sub-tab" data-sub="nose">코</button>
            <button class="sub-tab" data-sub="mouth">입</button>
          </div>
          <div id="sub-face-shape" class="sub-panel">
            <div class="parts-grid" id="face-grid"></div>
          </div>
          <div id="sub-eyes" class="sub-panel hidden"></div>
          <div id="sub-nose" class="sub-panel hidden">
            <div class="parts-grid" id="nose-grid"></div>
          </div>
          <div id="sub-mouth" class="sub-panel hidden">
            <div class="parts-grid" id="mouth-grid"></div>
          </div>
        </div>

        <!-- 머리스타일 탭 -->
        <div id="panel-hair" class="category-panel hidden"></div>

        <!-- 의상 탭 -->
        <div id="panel-clothing" class="category-panel hidden"></div>

        <!-- 액세서리 탭 -->
        <div id="panel-accessory" class="category-panel hidden"></div>

        <!-- 성격 탭 -->
        <div id="panel-personality" class="category-panel hidden">
          <div id="personality-questions"></div>
        </div>
      </div>

    </div>

    <div class="bottom-bar">
      <button id="complete-btn" class="complete-btn" disabled>완성</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="result-screen" class="screen hidden">
    <div class="result-container">
      <h1 class="result-tada">완성!</h1>
      <div class="result-card">
        <div class="mbti-type" id="mbti-type-display"></div>
        <div class="mbti-name"></div>
        <div class="mbti-desc" id="mbti-desc-display"></div>
      </div>
      <div class="result-bottom">
        <button id="next-btn" class="next-btn">다음 →</button>
      </div>
    </div>
  </div>

</div>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>

<script src="js/parts.js?v=2"></script>
<script src="js/customize.js"></script>

<audio id="bgm" src="assets/audio/intro.mp3" loop></audio>
<script>
  const bgm = document.getElementById('bgm');
  bgm.volume = 0.4;
  document.addEventListener('click', () => {
    if (bgm.paused) bgm.play();
  }, { once: true });
</script>

</body>
</html>
