<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 공간</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .proto-btns {
      position: absolute;
      bottom: 20px;
      right: 24px;
      display: flex;
      gap: 10px;
    }
    .proto-btn {
      padding: 10px 22px;
      border: none;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: transform 0.12s, background 0.15s;
    }
    .proto-btn:active { transform: scale(0.95); }
    #smile-btn { background: #FFD700; color: #7a4800; box-shadow: 0 3px 10px rgba(255,200,0,0.35); }
    #smile-btn:hover { background: #FFC400; }
    #speak-btn { background: #ffffff; color: #333; box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
    #speak-btn:hover { background: #f5f5f5; }

    /* ── 와이프 오버레이 ── */
    #wipe {
      position: fixed;
      inset: 0;
      z-index: 100;
      transform: translateX(-100%);
      pointer-events: none;
    }
    #wipe.wipe-in  { animation: wipe-in  0.28s ease-in  forwards; }
    #wipe.wipe-out { animation: wipe-out 0.28s ease-out forwards; }

    @keyframes wipe-in {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }
    @keyframes wipe-out {
      from { transform: translateX(0); }
      to   { transform: translateX(100%); }
    }

    /* ── 외출 선택 화면 ── */
    #outing-screen {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }
    #outing-screen.visible { display: flex; }

    .location-btn {
      padding: 22px 48px;
      border-radius: 22px;
      border: 4px solid;
      background: rgba(255,255,255,0.82);
      font-size: 22px;
      font-weight: 800;
      color: #7a6a58;
      font-family: inherit;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: transform 0.12s;
      letter-spacing: 1px;
    }
    .location-btn:active { transform: scale(0.92); }

    #btn-outdoor { border-color: #87CEEB; }
    #btn-indoor  { border-color: #90EE90; }

    /* 일정 시작 버튼 */
    #outing-btn {
      position: absolute;
      top: 20px; right: 24px;
      padding: 13px 30px;
      border-radius: 30px;
      border: 4px solid var(--outfit-color, #aaa);
      background: rgba(255,255,255,0.9);
      color: #555;
      font-size: 18px;
      font-weight: 900;
      font-family: inherit;
      letter-spacing: 0.5px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: transform 0.1s;
      z-index: 50;
    }
    #outing-btn:active { transform: scale(0.93); }

    /* 메뉴 버튼 (투명) */
    #menu-btn {
      position: absolute;
      top: 78px; right: 24px;
      padding: 8px 14px;
      background: transparent;
      border: none;
      color: white;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      transition: transform 0.1s;
      z-index: 50;
    }
    #menu-btn:active { transform: scale(0.92); }

    /* 뒤로가기 버튼 */
    #back-btn {
      position: fixed;
      top: 20px; right: 24px;
      bottom: auto; left: auto;
      z-index: 91;
      display: none;
      padding: 13px 30px;
      border-radius: 30px;
      border: 4px solid rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.35);
      color: white;
      font-size: 18px;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: transform 0.1s;
    }
    #back-btn.visible { display: block; }
    #back-btn:active  { transform: scale(0.93); }

    /* ── 메뉴 백드롭 ── */
    #menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 110;
      display: none;
    }
    #menu-backdrop.visible { display: block; }

    /* ── 메뉴 패널 (파도치는 모서리) ── */
    #menu-panel {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      width: 340px;
      padding: 28px 26px;
      background: rgba(255,253,250,0.98);
      border-radius: 38px 26px 38px 26px / 26px 38px 26px 38px;
      box-shadow: 0 14px 44px rgba(0,0,0,0.28);
      z-index: 120;
      display: none;
      flex-direction: column;
      gap: 18px;
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }
    #menu-panel.visible {
      display: flex;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .menu-mbti-row {
      font-size: 16px;
      font-weight: 700;
      color: #444;
      padding-bottom: 14px;
      border-bottom: 2px dashed rgba(0,0,0,0.12);
      text-align: center;
    }
    #menu-mbti-value {
      color: #007AFF;
      font-weight: 800;
      margin-left: 6px;
      letter-spacing: 2px;
    }

    .menu-volume-row {
      display: flex; align-items: center; gap: 12px;
      font-size: 14px; color: #555;
    }
    .menu-volume-row label { font-weight: 600; min-width: 40px; }
    .menu-volume-row input[type="range"] { flex: 1; }

    .menu-save-btn {
      padding: 10px 16px;
      border-radius: 14px;
      border: 2px solid #FFD700;
      background: rgba(255,215,0,0.18);
      color: #7a4800;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .menu-save-btn:active { transform: scale(0.96); }

    .menu-items-btn {
      padding: 10px 16px;
      border-radius: 14px;
      border: 2px solid #B8E0FF;
      background: rgba(184,224,255,0.18);
      color: #2C4A6B;
      font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: transform 0.1s;
    }
    .menu-items-btn:active { transform: scale(0.96); }

    /* 전체 통계 보기 버튼 (임시) */
    .menu-stats-btn {
      padding: 10px 16px;
      border-radius: 14px;
      border: 2px solid #C9A0DC;
      background: rgba(201,160,220,0.18);
      color: #5a3a6b;
      font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: transform 0.1s;
    }
    .menu-stats-btn:active { transform: scale(0.96); }

    .menu-check-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #555; cursor: pointer;
    }

    /* ── 야외 장소 선택 ── */
    #outdoor-screen {
      position: fixed; inset: 0;
      z-index: 90;
      display: none;
      align-items: center; justify-content: center;
    }
    #outdoor-screen.visible { display: flex; }

    .location-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }
    .outdoor-place { border-color: #87CEEB; }  /* 실외와 동일 하늘색 */

    /* ── 이벤트 컨테이너 ── */
    #event-container {
      position: fixed; inset: 0;
      z-index: 95;
      pointer-events: none;
    }
    #event-container > * { pointer-events: auto; }

    /* ── 아이템 목록 패널 ── */
    #items-panel {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      width: 440px;
      padding: 26px 26px 20px;
      background: rgba(255,253,250,0.98);
      border-radius: 32px;
      box-shadow: 0 14px 44px rgba(0,0,0,0.28);
      z-index: 130;
      display: none;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }
    #items-panel.visible {
      display: flex;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .items-header {
      font-size: 17px; font-weight: 800;
      text-align: center; color: #333;
      padding-bottom: 12px;
      border-bottom: 2px dashed rgba(0,0,0,0.12);
    }
    #items-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-height: 340px;
      overflow-y: auto;
      padding: 4px;
    }
    .item-slot {
      aspect-ratio: 1;
      border: 2px solid #ddd;
      border-radius: 14px;
      background: white;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .item-slot img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .no-items {
      text-align: center; color: #999; padding: 28px;
      grid-column: 1 / -1; font-size: 14px;
    }
    #items-close {
      padding: 10px 22px;
      border-radius: 14px;
      border: 2px solid #ddd;
      background: white;
      color: #555;
      font-size: 14px; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }

    /* ── 인트로 게이트 ── */
    #intro-gate {
      position: fixed; inset: 0;
      background: white;
      z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px;
      transition: opacity 0.5s;
    }
    #intro-gate.hidden { opacity: 0; pointer-events: none; }
    .intro-text {
      font-size: 26px;
      font-weight: 800;
      color: #444;
      letter-spacing: 1px;
    }
    #intro-go-btn {
      padding: 14px 42px;
      border-radius: 30px;
      border: 4px solid #7A5C3A;
      background: #FFD700;
      color: #7A5C3A;
      font-size: 22px;
      font-weight: 800;
      font-family: inherit;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.1s;
    }
	#intro-go-btn:disabled {
      background: #ccc;
      color: #888;
      border-color: #aaa;
      cursor: not-allowed;
    }
    #intro-go-btn:active { transform: scale(0.94); }
  </style>
</head>
<body>
  <div id="game-screen" class="screen">
    <canvas id="game-canvas" tabindex="0"></canvas>
    <div class="game-ui">마우스 드래그로 시점을 돌려 관찰하세요</div>

    <!-- 일정 시작 / 메뉴 버튼 -->
    <button id="outing-btn">일정 시작</button>
    <button id="menu-btn">
      <svg width="20" height="16" viewBox="0 0 24 18" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none">
        <line x1="2" y1="3"  x2="22" y2="3"/>
        <line x1="2" y1="9"  x2="22" y2="9"/>
        <line x1="2" y1="15" x2="22" y2="15"/>
      </svg>
      <span>메뉴</span>
    </button>

    <!-- 메뉴 -->
    <div id="menu-backdrop"></div>
    <div id="menu-panel">
      <div class="menu-mbti-row">엄마 유형: <span id="menu-mbti-value">—</span></div>
      <div class="menu-volume-row">
        <label>볼륨</label>
        <input type="range" id="vol-slider" min="0" max="100" value="30">
      </div>
      <button class="menu-save-btn">💾 저장</button>
      <button class="menu-items-btn">🎒 아이템 목록</button>
      <button class="menu-stats-btn" onclick="location.href='stats.html'">📊 전체 통계 보기 (임시)</button>
      <label class="menu-check-row">
        <input type="checkbox" id="online-stats-toggle"> 온라인 통계 표시
      </label>
    </div>

    <!-- 아이템 목록 패널 -->
    <div id="items-panel">
      <div class="items-header">소지 아이템</div>
      <div id="items-grid"></div>
      <button id="items-close">닫기</button>
    </div>

    <!-- 저장 패널 (스타일은 save.js가 주입) -->
    <div id="save-panel">
      <div class="save-header">저장</div>
      <div class="save-slots" id="save-slots"></div>
      <button class="save-close" id="save-close">닫기</button>
    </div>

    <!-- 와이프 오버레이 -->
    <div id="wipe"></div>

    <!-- 외출 선택 화면 -->
    <div id="outing-screen">
      <button class="location-btn" id="btn-outdoor">실외</button>
      <button class="location-btn" id="btn-indoor">실내</button>
    </div>

    <!-- 야외 장소 선택 -->
    <div id="outdoor-screen">
      <div class="location-grid">
        <button class="location-btn outdoor-place" data-place="restaurant">식당</button>
        <button class="location-btn outdoor-place" data-place="mart">마트</button>
        <button class="location-btn outdoor-place" data-place="dept">백화점</button>
        <button class="location-btn outdoor-place" data-place="movie">영화관</button>
        <button class="location-btn outdoor-place" data-place="street">거리</button>
        <button class="location-btn outdoor-place" data-place="park">공원</button>
      </div>
    </div>

    <!-- 이벤트 컨테이너 (동적 로드) -->
    <div id="event-container"></div>

    <!-- 뒤로가기 -->
    <button id="back-btn">← 뒤로가기</button>

    <!-- 프로토타입 버튼들 -->
    <div class="proto-btns">
    <button id="speak-btn" class="proto-btn">💬 말하기</button>
    <button id="smile-btn" class="proto-btn">😊 웃기</button>
    <button id="sofa-btn" class="proto-btn" style="background:#C9A0DC;color:#3a2a4a;">🛋️ 소파(테스트)</button>
  </div>
  </div>

  <!-- 인트로 게이트 -->
  <div id="intro-gate">
    <div class="intro-text">엄마와의 일주일이 시작된다!</div>
    <button id="intro-go-btn" disabled>로딩 중...</button>
  </div>

  <!-- 라이브러리 & 게임 스크립트 -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/parts.js"></script>
  <script src="js/save.js"></script>
  <script src="js/events/engine.js"></script>
  <script src="js/game.js"></script>

  <!-- BGM + 인트로 게이트 -->
  <audio id="bgm" src="assets/audio/daily.mp3" loop></audio>
<script>
  const bgm = document.getElementById('bgm');
  const gate = document.getElementById('intro-gate');
  const goBtn = document.getElementById('intro-go-btn');
  bgm.volume = 0.3;

  (async () => {
    try {
      const cd = JSON.parse(localStorage.getItem('charData') || '{}');
      await FaceParts.preloadFace(cd);
    } catch (e) { console.warn('preload', e); }
    goBtn.disabled = false;
    goBtn.textContent = 'GO! →';
  })();

  goBtn.addEventListener('click', () => {
    if (goBtn.disabled) return;
    bgm.play();
    gate.classList.add('hidden');
    setTimeout(() => gate.remove(), 500);
  }, { once: true });

  document.addEventListener('click', () => {
    if (bgm.paused) bgm.play().catch(() => {});
  });
</script>

  <!-- 온라인 통계 토글 저장 -->
  <script>
    (function () {
      const toggle = document.getElementById('online-stats-toggle');
      if (!toggle) return;
      const saved = localStorage.getItem('onlineStatsOn');
      toggle.checked = (saved === null) ? true : (saved === '1');
      if (saved === null) localStorage.setItem('onlineStatsOn', '1');
      toggle.addEventListener('change', () => {
        localStorage.setItem('onlineStatsOn', toggle.checked ? '1' : '0');
      });
    })();
  </script>

  <!-- ▼▼▼ 개발용 디버그 패널 (임시 - 배포 전 이 블록 통째로 삭제) ▼▼▼ -->
  <script>
    (function () {
      const btn = document.createElement('button');
      btn.textContent = 'DEV';
      btn.style.cssText = `
        position:fixed; bottom:14px; left:14px; z-index:9999;
        padding:8px 14px; border-radius:10px; border:none;
        background:#222; color:#0f0; font-family:monospace;
        font-size:13px; font-weight:700; cursor:pointer; opacity:0.75;
      `;
      document.body.appendChild(btn);

      const panel = document.createElement('div');
      panel.style.cssText = `
        position:fixed; inset:0; z-index:9998; display:none;
        background:rgba(0,0,0,0.85); padding:40px; overflow:auto;
        font-family:monospace; font-size:13px; color:#ddd;
      `;
      document.body.appendChild(panel);

      function render() {
        const keys = Object.keys(localStorage).sort();
        let html = `
          <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
            <button id="dev-close" style="padding:8px 16px;border:none;border-radius:8px;background:#555;color:#fff;font-family:monospace;cursor:pointer;">닫기</button>
            <button id="dev-copy" style="padding:8px 16px;border:none;border-radius:8px;background:#3a6;color:#fff;font-family:monospace;cursor:pointer;">전체 복사</button>
            <button id="dev-clear" style="padding:8px 16px;border:none;border-radius:8px;background:#a33;color:#fff;font-family:monospace;cursor:pointer;">전체 삭제</button>
            <span style="align-self:center;color:#888;">총 ${keys.length}개 키</span>
          </div>`;
        let raw = '';
        keys.forEach(k => {
          let v = localStorage.getItem(k);
          let pretty = v;
          try { pretty = JSON.stringify(JSON.parse(v), null, 2); } catch (e) {}
          raw += `${k} = ${v}\n`;
          html += `
            <div style="margin-bottom:14px;border-left:3px solid #0a0;padding-left:12px;">
              <div style="color:#0f0;font-weight:700;margin-bottom:4px;">${k}</div>
              <pre style="margin:0;white-space:pre-wrap;word-break:break-all;color:#ccc;">${pretty.replace(/</g,'&lt;')}</pre>
            </div>`;
        });
        if (!keys.length) html += '<div style="color:#888;">저장된 내용 없음</div>';
        panel.innerHTML = html;

        panel.querySelector('#dev-close').onclick = () => { panel.style.display = 'none'; };
        panel.querySelector('#dev-copy').onclick = () => {
          navigator.clipboard.writeText(raw).then(() => alert('복사됨!'));
        };
        panel.querySelector('#dev-clear').onclick = () => {
          if (confirm('localStorage 전체를 삭제할까요? (저장 슬롯 포함)')) {
            localStorage.clear(); render();
          }
        };
      }

      btn.onclick = () => { render(); panel.style.display = 'block'; };
    })();
  </script>
  <!-- ▲▲▲ 개발용 디버그 패널 끝 ▲▲▲ -->

</body>
</html>
